<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>지시약 색으로 pH 추정하기</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 40px;
        }
        .container {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
        }
        .step {
            display: none;
        }
        .step.active {
            display: block;
        }
        label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        .navigation {
            margin-top: 20px;
        }
        button {
            padding: 10px 15px;
            font-size: 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .prev-btn {
            background-color: #f0f0f0;
            color: #333;
        }
        .next-btn, .predict-btn {
            background-color: #007BFF;
            color: white;
        }
        #result {
            margin-top: 30px;
            font-size: 20px;
            font-weight: bold;
            color: darkblue;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>🌈 지시약 색으로 pH 추정하기</h2>

    <div class="container">
        <div id="step1" class="step active">
            <label for="mo">1️⃣ 메틸오렌지 색은?</label>
            <select id="mo">
                <option value="">-- 선택하세요 --</option>
                <option value="빨간색">빨간색</option>
                <option value="노란색">노란색</option>
            </select>
            <div class="navigation">
                <button class="next-btn" onclick="nextStep(2)">다음</button>
            </div>
        </div>

        <div id="step2" class="step">
            <label for="pp">2️⃣ 페놀프탈레인 색은?</label>
            <select id="pp">
                <option value="">-- 선택하세요 --</option>
                <option value="붉은색">붉은색</option>
                <option value="무색">무색</option>
            </select>
            <div class="navigation">
                <button class="prev-btn" onclick="prevStep(1)">이전</button>
                <button class="next-btn" onclick="nextStep(3)">다음</button>
            </div>
        </div>

        <div id="step3" class="step">
            <label for="btb">3️⃣ BTB 색은?</label>
            <select id="btb">
                <option value="">-- 선택하세요 --</option>
                <option value="노란색">노란색</option>
                <option value="초록색">초록색</option>
                <option value="파란색">파란색</option>
            </select>
            <div class="navigation">
                <button class="prev-btn" onclick="prevStep(2)">이전</button>
                <button class="predict-btn" onclick="predictPH()">pH 추정하기</button>
            </div>
        </div>
    </div>

    <div id="result"></div>

    <script>
        let currentStep = 1;

        function nextStep(step) {
            const mo = document.getElementById("mo").value;
            const pp = document.getElementById("pp").value;

            // 메틸오렌지 선택 후 pH<4.4일 경우, 2,3단계 스킵하고 바로 결과 표시
            if (step === 2 && mo === "빨간색") {
                predictPH();
                return;
            }

            // 페놀프탈레인 선택 후 pH>8.3일 경우, 3단계 스킵하고 바로 결과 표시
            if (step === 3 && pp === "붉은색") {
                predictPH();
                return;
            }

            // 현재 단계에서 값을 선택하지 않았을 경우 경고
            if (step === 2 && mo === "") {
                alert("메틸오렌지 색을 먼저 선택해 주세요.");
                return;
            }
            if (step === 3 && pp === "") {
                alert("페놀프탈레인 색을 먼저 선택해 주세요.");
                return;
            }

            document.getElementById('step' + currentStep).classList.remove('active');
            document.getElementById('step' + step).classList.add('active');
            currentStep = step;
            document.getElementById("result").textContent = ""; // 단계 이동 시 결과 초기화
        }

        function prevStep(step) {
            document.getElementById('step' + currentStep).classList.remove('active');
            document.getElementById('step' + step).classList.add('active');
            currentStep = step;
            document.getElementById("result").textContent = ""; // 단계 이동 시 결과 초기화
        }
        
        function predictPH() {
            const mo = document.getElementById("mo").value;
            const pp = document.getElementById("pp").value;
            const btb = document.getElementById("btb").value;
            const result = document.getElementById("result");
            
            // 입력 누락 안내
            if (mo === "") {
                result.textContent = "메틸오렌지 색을 선택해 주세요.";
                return;
            }
            
            // 메틸오렌지 색에 따라 pH 범위 추정
            if (mo === "빨간색") {
                result.textContent = "→ pH < 4.4";
                return;
            }

            // 메틸오렌지가 '노란색'일 때, 페놀프탈레인으로 넘어감
            if (pp === "") {
                result.textContent = "페놀프탈레인 색을 선택해 주세요.";
                return;
            }
            
            // 페놀프탈레인 색에 따라 pH 범위 추정
            if (pp === "붉은색") {
                result.textContent = "→ pH > 8.3";
                return;
            }

            // 메틸오렌지가 '노란색'이고 페놀프탈레인이 '무색'일 때, BTB로 넘어감
            if (btb === "") {
                result.textContent = "BTB 색을 선택해 주세요.";
                return;
            }

            // BTB 색에 따라 pH 범위 추정
            if (btb === "노란색") {
                result.textContent = "→ 4.4 < pH < 6.0";
            } else if (btb === "초록색") {
                result.textContent = "→ 6.0 ≤ pH ≤ 7.6";
            } else if (btb === "파란색") {
                result.textContent = "→ 7.6 < pH < 8.3";
            }
        }
    </script>

</body>
</html>
