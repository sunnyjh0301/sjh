<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 실시간 발표자 추첨기</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            width: 100%;
            max-width: 1000px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .count-badge {
            font-size: 0.85rem;
            background: #334155;
            padding: 4px 10px;
            border-radius: 20px;
            color: var(--text-muted);
        }

        textarea {
            width: 100%;
            height: 180px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            color: var(--text-main);
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        .options {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .options input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* 우측 디스플레이 및 추첨 영역 */
        .display-area {
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 300px;
            position: relative;
        }

        .winner-display {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 40px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            color: var(--text-main);
            transition: transform 0.1s ease;
        }

        .winner-display.pick {
            color: var(--success-color);
            scale: 1.1;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background-color: #475569;
            color: #94a3b8;
            transform: none;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 히스토리 영역 */
        .history-card {
            grid-column: span 2;
        }
        
        @media (max-width: 768px) {
            .history-card {
                grid-column: span 1;
            }
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .history-item {
            background: #334155;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .history-index {
            color: var(--accent-color);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <header>
        <h1>⚡ 발표자 추첨기</h1>
        <p>명단을 입력하고 버튼을 눌러 공정하게 발표자를 선정해보세요!</p>
    </header>

    <div class="container">
        <div class="card">
            <div class="section-title">
                <span>발표 후보자 명단</span>
                <span class="count-badge" id="candidateCount">대기: 0명</span>
            </div>
            <textarea id="nameInput" placeholder="이름을 줄바꿈(엔터)이나 쉼표(,)로 구분해서 입력해주세요.&#10;예시)&#10;홍길동&#10;김철수, 이영희"></textarea>
            <label class="options">
                <input type="checkbox" id="excludeChecked" checked>
                <span>한 번 뽑힌 사람은 다음 추첨에서 제외하기</span>
            </label>
        </div>

        <div class="card display-area">
            <div class="section-title" style="width: 100%;">추첨 결과</div>
            <div class="winner-display" id="resultDisplay">READY</div>
            <button class="btn" id="drawBtn">추첨하기 🎲</button>
        </div>

        <div class="card history-card">
            <div class="section-title">
                <span>추첨 기록</span>
                <button id="clearHistory" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.85rem; text-decoration:underline;">기록 초기화</button>
            </div>
            <div class="history-list" id="historyList">
                </div>
        </div>
    </div>

    <script>
        const nameInput = document.getElementById('nameInput');
        const candidateCount = document.getElementById('candidateCount');
        const resultDisplay = document.getElementById('resultDisplay');
        const drawBtn = document.getElementById('drawBtn');
        const excludeChecked = document.getElementById('excludeChecked');
        const historyList = document.getElementById('historyList');
        const clearHistory = document.getElementById('clearHistory');

        let currentPool = [];
        let historyLog = [];

        // 입력창 텍스트로부터 깔끔한 배열 생성
        function getNames() {
            const text = nameInput.value;
            // 줄바꿈 및 쉼표 기준으로 쪼개고 공백 제거, 빈 줄 제거
            return text.split(/[\n,]+/).map(name => name.trim()).filter(name => name !== '');
        }

        // 실시간으로 대기 인원 갱신
        function updatePoolCount() {
            const names = getNames();
            if (currentPool.length === 0 || !excludeChecked.checked) {
                candidateCount.textContent = `대기: ${names.length}명`;
            } else {
                candidateCount.textContent = `잔여: ${currentPool.length}명 / 전체: ${names.length}명`;
            }
        }

        nameInput.addEventListener('input', () => {
            currentPool = getNames();
            updatePoolCount();
        });

        excludeChecked.addEventListener('change', () => {
            currentPool = getNames();
            updatePoolCount();
        });

        // 추첨 로직 애니메이션
        function drawPresenter() {
            // 풀이 비어있으면 새로 고침 (또는 중복 제외 옵션이 아닐 때)
            if (currentPool.length === 0 || !excludeChecked.checked) {
                currentPool = getNames();
            }

            if (currentPool.length === 0) {
                alert('명단에 유효한 이름을 입력해주세요!');
                return;
            }

            // 버튼 비활성화
            drawBtn.disabled = true;
            resultDisplay.classList.remove('pick');

            let duration = 2000; // 애니메이션 총 지속 시간 (2초)
            let intervalTime = 50; // 이름이 바뀌는 속도 (0.05초)
            let elapsed = 0;

            const allNames = getNames(); // 화면 셔플용 전체 명단

            const timer = setInterval(() => {
                // 전체 명단 중에서 무작위로 화면에 스치듯 보여줌 (시각적 효과)
                const randomIdx = Math.floor(Math.random() * allNames.length);
                resultDisplay.textContent = allNames[randomIdx];
                elapsed += intervalTime;

                // 시간이 다 되면 멈추고 최종 선발
                if (elapsed >= duration) {
                    clearInterval(timer);
                    
                    // 실제 잔여 풀에서 선정
                    const finalIdx = Math.floor(Math.random() * currentPool.length);
                    const winner = currentPool[finalIdx];

                    // 중복 제거 옵션이 켜져 있으면 배열에서 추출해냄
                    if (excludeChecked.checked) {
                        currentPool.splice(finalIdx, 1);
                    }

                    // 최종 결과 반영
                    resultDisplay.textContent = winner;
                    resultDisplay.classList.add('pick');
                    
                    // 히스토리 추가
                    historyLog.push(winner);
                    renderHistory();
                    
                    // 풀 상태 업데이트
                    updatePoolCount();
                    drawBtn.disabled = false;
                }
            }, intervalTime);
        }

        // 히스토리 렌더링
        function renderHistory() {
            historyList.innerHTML = '';
            historyLog.forEach((name, idx) => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `<span class="history-index">#${idx + 1}</span> ${name}`;
                historyList.appendChild(item);
            });
        }

        // 초기화
        clearHistory.addEventListener('click', () => {
            historyLog = [];
            renderHistory();
            currentPool = getNames();
            updatePoolCount();
            resultDisplay.textContent = "READY";
            resultDisplay.classList.remove('pick');
        });

        drawBtn.addEventListener('click', drawPresenter);
    </script>
</body>
</html>
