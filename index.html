<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 실시간 발표자 추첨기</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            width: 100%;
            max-width: 1000px;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .count-badge {
            font-size: 0.85rem;
            background: #334155;
            padding: 4px 10px;
            border-radius: 20px;
            color: var(--text-muted);
        }

        textarea {
            width: 100%;
            height: 180px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            color: var(--text-main);
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--accent-color);
        }

        .options {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .options input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* 우측 디스플레이 및 추첨 영역 */
        .display-area {
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 300px;
            position: relative;
        }

        .winner-display {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 40px 0;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            word-break: break-all;
            color: var(--text-main);
            transition: transform 0.1s ease;
        }

        .winner-display.pick {
            color: var(--success-color);
            scale: 1.1;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background-color: #475569;
            color: #94a3b8;
            transform: none;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 히스토리 영역 */
        .history-card {
            grid-column: span 2;
        }
        
        @media (max-width: 768px) {
            .history-card {
                grid-column: span 1;
            }
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .history-item {
            background: #334155;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
